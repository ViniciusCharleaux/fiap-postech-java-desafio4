services:
  postgres:
    image: postgres:16
    container_name: tc4-postgres
    environment:
      POSTGRES_DB: feedback_db
      POSTGRES_USER: tc4_user
      POSTGRES_PASSWORD: tc4_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tc4_user -d feedback_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: